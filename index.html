<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mailen Bernardoni — Marketing & Comunicación</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FDFBF8;      /* Fondo neutro claro */
    --ink: #301400;       /* Chocolate Oscuro */
    --accent: #88c970;    /* Verde Hierba */
    --earth: #916e37;     /* Marrón Tierra */
    --muted: #5D4D3F;     /* Tono café suave */
    --light-rule: #E8E2D9;
    --white: #FFFFFF;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    overflow-x: hidden;
  }

  /* ── NAVEGACIÓN ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 3rem;
    background: rgba(253, 251, 248, 0.95);
    border-bottom: 1px solid var(--light-rule);
    backdrop-filter: blur(10px);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    text-decoration: none;
    color: var(--ink);
  }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    font-size: 0.8rem;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding-top: 5rem;
  }
  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 5rem;
    border-right: 1px solid var(--light-rule);
  }
  .hero-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 6vw, 6rem);
    font-weight: 900;
    line-height: 0.92;
    margin-bottom: 2rem;
  }
  .hero-name em { font-style: italic; color: var(--accent); }
  .hero-desc { color: var(--muted); margin-bottom: 2.5rem; max-width: 38ch; line-height: 1.6; }
  .hero-cta {
    display: inline-block;
    background: var(--ink);
    color: var(--white);
    padding: 1rem 2rem;
    text-decoration: none;
    text-transform: uppercase;
    font-size: 0.8rem;
    transition: 0.3s;
    width: fit-content;
  }
  .hero-cta:hover { background: var(--earth); }

  /* ── LÍNEA DE TIEMPO (TIMELINE) ── */
  #experiencia { padding: 6rem 5rem; background: var(--white); }
  .timeline {
    position: relative;
    max-width: 900px;
    margin: 4rem auto;
  }
  .timeline::after {
    content: '';
    position: absolute;
    width: 2px;
    background: var(--light-rule);
    top: 0; bottom: 0; left: 50%;
    margin-left: -1px;
  }
  .timeline-item {
    padding: 20px 40px;
    position: relative;
    width: 50%;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease-out;
  }
  .timeline-item.visible { opacity: 1; transform: translateY(0); }
  .left { left: 0; text-align: right; }
  .right { left: 50%; text-align: left; }
  
  .timeline-item::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    right: -9px; top: 25px;
    background: var(--accent);
    border: 4px solid var(--white);
    border-radius: 50%;
    z-index: 1;
  }
  .right::after { left: -9px; }

  .timeline-content {
    padding: 1.5rem;
    background: var(--cream);
    border: 1px solid var(--light-rule);
  }
  .timeline-date { color: var(--earth); font-weight: 700; font-size: 0.85rem; margin-bottom: 0.5rem; display: block; }
  .timeline-content h3 { font-family: 'Playfair Display', serif; margin-bottom: 0.5rem; }

  /* ── PORTFOLIO ── */
  #portfolio { padding: 6rem 5rem; background: var(--ink); color: var(--white); }
  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
    margin-top: 3rem;
  }
  .portfolio-card {
    background: rgba(255,255,255,0.03);
    padding: 2.5rem;
    border: 1px solid rgba(136, 201, 112, 0.15);
    transition: 0.4s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .portfolio-card:hover { border-color: var(--accent); background: rgba(136, 201, 112, 0.05); }
  .portfolio-card h3 { font-family: 'Playfair Display', serif; margin-bottom: 1rem; }
  
  .btn-behance {
    display: inline-block;
    margin-top: 1.5rem;
    padding: 0.7rem 1.5rem;
    border: 1px solid var(--accent);
    color: var(--accent);
    text-decoration: none;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: 0.3s;
  }
  .btn-behance:hover { background: var(--accent); color: var(--ink); font-weight: bold; }

  /* ── CONTACTO ── */
  #contacto { padding: 8rem 5rem; text-align: center; background: var(--cream); }
  .contact-link {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3vw, 2rem);
    color: var(--ink);
    text-decoration: none;
    border-bottom: 3px solid var(--accent);
    padding-bottom: 5px;
    transition: color 0.3s;
  }
  .contact-link:hover { color: var(--earth); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    #hero { grid-template-columns: 1fr; }
    .hero-left { padding: 5rem 2rem; border-right: none; }
    .timeline::after { left: 31px; }
    .timeline-item { width: 100%; padding-left: 70px; padding-right: 20px; text-align: left; }
    .timeline-item::after { left: 22px; }
    .right { left: 0%; }
    section { padding: 4rem 2rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="#hero" class="nav-logo">MAILEN B.</a>
  <ul class="nav-links">
    <li><a href="#experiencia">Experiencia</a></li>
    <li><a href="#portfolio">Portfolio</a></li>
    <li><a href="#contacto">Contacto</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-left">
    <h1 class="hero-name">Mailen<br><em>Bernar</em>doni</h1>
    <p class="hero-desc">Licenciada en Comunicación, Publicista y Directora Creativa. Transformando marcas a través del diseño estratégico y contenido de alto impacto.</p>
    <a href="#portfolio" class="hero-cta">Explorar Proyectos</a>
  </div>
  <div style="background: #F2EEE7; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display'; color: #916e37; font-size: 5rem; opacity: 0.2;">MB</div>
</section>

<section id="experiencia">
  <h2 style="text-align:center; font-family:'Playfair Display'; font-size: 2.5rem;">Trayectoria <em>Profesional</em></h2>
  <div class="timeline">
    <div class="timeline-item left">
      <div class="timeline-content">
        <span class="timeline-date">2024
